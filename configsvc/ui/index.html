<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Config Center | JSON Editor</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" />
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar glass-panel">
            <div class="sidebar-header">
                <span class="material-symbols-outlined logo-icon">folder_data</span>
                <h2>Services</h2>
                <div style="flex: 1"></div>
                <button class="btn-icon-soft" id="btn-add-service" title="Add New Service">
                    <span class="material-symbols-outlined">add</span>
                </button>
            </div>
            <ul class="tree-nav" id="service-list">
                <!-- Populated by JS -->
            </ul>
        </aside>

        <!-- Main Editor Area -->
        <main class="editor-area glass-panel">
            <header class="editor-header">
                <div class="file-info">
                    <span class="material-symbols-outlined">description</span>
                    <h3 id="current-file-name">Select a service</h3>
                    
                    <div id="selectors" style="display: none; display: flex; gap: 12px; margin-left: 12px; align-items: center;">
                        <span class="material-symbols-outlined" style="color: var(--text-secondary); font-size: 18px;">code_blocks</span>
                        <select id="template-select" class="version-select">
                            <!-- JS populated -->
                        </select>
                    </div>
                    <span class="status-badge" id="save-status">Unsaved</span>
                </div>
                
                <div class="editor-actions">
                    <button class="btn btn-secondary" id="btn-format" title="Format Code">
                        <span class="material-symbols-outlined">data_object</span> Format
                    </button>
                    <button class="btn btn-primary" id="btn-save-update" disabled title="Save Changes">
                        <span class="material-symbols-outlined">save</span> Save Changes
                    </button>
                </div>
            </header>
            
            <div class="three-col-layout">
                <div class="col-panel">
                    <div class="col-header">
                        <span class="material-symbols-outlined">code_blocks</span>
                        Template (Jsonnet)
                    </div>
                    <textarea id="template-editor" spellcheck="false" placeholder="// Enter Jsonnet template here..."></textarea>
                </div>
                
                <div class="col-panel">
                    <div class="col-header">
                        <span class="material-symbols-outlined">data_object</span>
                        <select id="env-select" class="version-select" style="background: transparent; border: none; font-weight: 600; text-transform: uppercase; padding: 0;">
                            <option value="base">Base Values</option>
                            <option value="dev">dev.json</option>
                            <option value="staging">staging.json</option>
                            <option value="prod">prod.json</option>
                        </select>
                    </div>
                    <textarea id="value-editor" spellcheck="false" placeholder="// Enter JSON values here..."></textarea>
                </div>

                <div class="col-panel result-panel">
                    <div class="col-header">
                        <span class="material-symbols-outlined">preview</span>
                        Rendered Result
                        <div class="header-badge">Read-only</div>
                    </div>
                    <textarea id="result-editor" readonly spellcheck="false" placeholder="// The merged output will appear here..."></textarea>
                </div>
            </div>
            
            <!-- Optional error bar -->
            <div class="error-bar" id="error-bar">
                <span class="material-symbols-outlined">error</span>
                <span id="error-text">Invalid format</span>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
